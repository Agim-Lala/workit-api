networks:
  local:
    name: workit-local
    driver: bridge

volumes:
  workit-postgres-data:
    external: false

services:
  postgres:
    container_name: workit-postgres
    image: postgres:16
    environment:
      POSTGRES_DB: workit_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - workit-postgres-data:/var/lib/postgresql/data
    networks:
      - local
    ports:
      - "5543:5432"

  redis:
    container_name: workit-redis
    image: redis:latest
    networks:
      - local
    ports:
      - "6381:6379"

  # Optional local Seq. Enable only if needed.
